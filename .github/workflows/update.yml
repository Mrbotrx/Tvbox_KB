name: KB TV Auto Filter

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Filter
        env:
          SOURCE_URL: ${{ secrets.SOURCE_URL }}
        run: |
          python filter.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add kb_tv.m3u

          if git diff --cached --quiet; then
            echo "No changes"
          else
            TOTAL=$(grep -c "^#EXTINF" kb_tv.m3u || echo 0)
            git commit -m "Auto Update | ${TOTAL} Channels"
            git push
          fi
