name: KB TV Auto Filter

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install requests

      - name: Run Filter
        env:
          SOURCE_URL: ${{ secrets.SOURCE_URL }}
        run: |
          python filter.py

      - name: Commit
        run: |
          TOTAL=$(grep -c "^#EXTINF" kb_tv.m3u || echo 0)

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add kb_tv.m3u

          git diff --staged --quiet || \
          git commit -m "Auto Update | ${TOTAL} Channels"

          git push
