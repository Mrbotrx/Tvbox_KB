name: Fifa_world_cup_pro Bot

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python Fifa.py
        env:
          PLAYLIST_URL: ${{ secrets.PLAYLIST_URL }}

      - run: |
          git config user.name "Fifa_world_cup_pro Bot"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update" || exit 0
          git pushpush
