name: KB TV PRO Auto System

on:
  workflow_dispatch:
  schedule:
    - cron: "*/45 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Repo checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install requirements
        run: pip install requests

      # 4. Run IPTV script (FIXED ENV PASS)
      - name: Run IPTV Generator
        env:
          INPUT_URL: ${{ secrets.INPUT_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python src/main.py

      # 5. Commit output files back to repo
      - name: Commit results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add output/bd_fifa.m3u8 output/channels.json

          git commit -m "auto update IPTV playlist" || echo "No changes to commit"

          git push
          git push
