name: Fifa_world_cup_pro Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  update:
    name: Fifa_world_cup_pro Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          PLAYLIST_URL: ${{ secrets.PLAYLIST_URL }}
        run: python Fifa.py

      - name: Commit
        run: |
          git config user.name "Fifa_world_cup_pro Bot"
          git config user.email "actions@github.com"
          git add Fifa_world_cup_pro.m3u
          git commit -m "Auto update" || exit 0
          git push
